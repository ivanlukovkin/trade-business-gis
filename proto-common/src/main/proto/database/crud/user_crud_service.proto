syntax = "proto3";

import "google/protobuf/empty.proto";

option java_package = "org.lkvkn.gistrade.service.entity";
option java_multiple_files = true;
option java_outer_classname = "UserServiceProto";

message UserGrpcDto {
    int64 id = 1;
    string full_name = 2;
    string username = 3;
    string password = 4;
    string role = 5;
}

message FindUserRequest {
    int64 id = 1;
}

message UserGrpcDtos {
    repeated UserGrpcDto users = 1;
}

service UserService {
    rpc Create(UserGrpcDto) returns (UserGrpcDto);
    rpc ReadAll(google.protobuf.Empty) returns (UserGrpcDtos);
    rpc Read(FindUserRequest) returns (UserGrpcDto);
    rpc Update(UserGrpcDto) returns (UserGrpcDto);
    rpc Delete(FindUserRequest) returns (google.protobuf.Empty);    
}
