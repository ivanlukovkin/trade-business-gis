name: Do migrations on push to master

on:
  push:
    branches: [ master ]

jobs:
  run-tests:
    name: Run tests
    runs-on: [ ubuntu-latest ]

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Launch testing
        uses: ./.github/actions/unit-test

  migrate-database:
    name: Migrate database
    needs: [ run-tests ]
    runs-on: [ self-hosted ]
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name:
        run: docker compose up flyway-migrate
        env:
          DB_HOST: ${{ secrets.PROD_DB_HOST }}
          DB_PORT: ${{ secrets.PROD_DB_PORT }}
          DB_NAME: ${{ secrets.PROD_DB_NAME }}
          DB_USERNAME: ${{ secrets.PROD_DB_USER }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PWD }}
  
  deploy-users-service:
    name: Deploy users service
    needs: [ migrate-database ]
    runs-on: [ self-hosted ]
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Stop running service
        run: |
          docker stop users-service || true
          docker rm users-service || true
    
      - name: Build and deploy service
        run: |
          docker compose up -d --build users-service
        env:
          DB_HOST: ${{ secrets.PROD_DB_HOST }}
          DB_PORT: ${{ secrets.PROD_DB_PORT }}
          DB_NAME: ${{ secrets.PROD_DB_NAME }}
          DB_USERNAME: ${{ secrets.PROD_DB_USER }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PWD }}
